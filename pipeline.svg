<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="680" role="img" aria-labelledby="t d" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="t">tlddr pipeline</title>
  <desc id="d">A four-stage square loop. Input enters at Extract. Extract to Understand across the top, down to Draft, across to Assemble, and Assemble returns up through a Review step on the left back to Extract. A Quarantine box in the centre receives flagged items from both Understand and Draft, and passes them to Review. Output leaves at Assemble.</desc>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1.5L8.5 5L1 8.5Z" fill="context-stroke" stroke="none"/>
    </marker>
  </defs>

  <g>
    <rect x="150" y="50" width="160" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
    <text x="230" y="76" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">1 · Extract</text>
    <text x="230" y="94" text-anchor="middle" font-size="11.5" fill="#0F6E56">route by signal type</text>
  </g>
  <g>
    <rect x="440" y="50" width="160" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
    <text x="520" y="76" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">2 · Understand</text>
    <text x="520" y="94" text-anchor="middle" font-size="11.5" fill="#0F6E56">describe · tag · link</text>
  </g>
  <g>
    <rect x="440" y="290" width="160" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
    <text x="520" y="316" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">3 · Draft</text>
    <text x="520" y="334" text-anchor="middle" font-size="11.5" fill="#0F6E56">grounded, page-cited</text>
  </g>
  <g>
    <rect x="150" y="290" width="160" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
    <text x="230" y="316" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">4 · Assemble</text>
    <text x="230" y="334" text-anchor="middle" font-size="11.5" fill="#0F6E56">judge · roll-up</text>
  </g>

  <line x1="310" y1="80" x2="434" y2="80" stroke="#0F6E56" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="520" y1="110" x2="520" y2="284" stroke="#0F6E56" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="440" y1="320" x2="316" y2="320" stroke="#0F6E56" stroke-width="2" marker-end="url(#ah)"/>

  <path d="M230 290 L230 224" fill="none" stroke="#BA7517" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M230 176 L230 116" fill="none" stroke="#BA7517" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ah)"/>
  <g>
    <rect x="172" y="182" width="116" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
    <text x="230" y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Review</text>
  </g>

  <g>
    <rect x="315" y="180" width="130" height="40" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
    <text x="380" y="199" text-anchor="middle" font-size="13" font-weight="600" fill="#501313">Quarantine</text>
    <text x="380" y="213" text-anchor="middle" font-size="10" fill="#A32D2D">honest gaps</text>
  </g>
  <path d="M486 110 L420 178" fill="none" stroke="#A32D2D" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#ah)"/>
  <path d="M486 290 L420 222" fill="none" stroke="#A32D2D" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#ah)"/>
  <line x1="315" y1="200" x2="292" y2="200" stroke="#A32D2D" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#ah)"/>

  <path d="M62 80 L144 80" fill="none" stroke="#5F5E5A" stroke-width="2" marker-end="url(#ah)"/>
  <text x="62" y="70" text-anchor="start" font-size="12" font-weight="600" fill="#5F5E5A">INPUT</text>
  <text x="62" y="98" text-anchor="start" font-size="10.5" fill="#888780">docs · pdf · xlsx</text>

  <path d="M230 350 L230 384" fill="none" stroke="#185FA5" stroke-width="2" marker-end="url(#ah)"/>
  <text x="250" y="370" text-anchor="start" font-size="12" font-weight="600" fill="#185FA5">OUTPUT</text>
  <text x="250" y="386" text-anchor="start" font-size="10.5" fill="#378ADD">attributed report + sidecar</text>
</svg>
